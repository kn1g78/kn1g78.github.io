<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>沉痛缅怀李梓诚💔</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
        }

        .tombstone {
            background-color: #808080;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .tombstone h1 {
            margin: 0;
        }

        .tombstone p {
            margin: 50px 0;
        }
        /* 在之前的样式后面添加 */

@keyframes champagneOpen {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}

.champagne-bottle {
    width: 100px;
    height: 200px;
    background-color: gold;
    border-radius: 10px;
    position: relative;
    margin: 20px auto;
    animation: none; /* 初始状态没有动画 */
}

.champagne-cork {
    width: 30px;
    height: 30px;
    background-color: brown;
    border-radius: 50%;
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
}

.champagne-pop {
    animation: champagneOpen 1s ease-out forwards; /* 应用动画 */
}
    </style>
</head>
<body background="white">
<center>
    <div class="tombstone">
        <h1>李梓诚</h1>
        <p>生于2010年</p>
        <p>暂时性逝于2024年3月</p>
        <p>永垂不朽</p>
    </div>
    <button id="openChampagneBtn">开香槟</button>
    <div class="champagne-bottle">
        <div class="champagne-cork"></div>
    </div>

    <script>
        // 获取按钮和香槟瓶元素
        const openChampagneBtn = document.getElementById('openChampagneBtn');
        const champagneBottle = document.querySelector('.champagne-bottle');

        // 为按钮添加点击事件监听器
        openChampagneBtn.addEventListener('click', function() {
            // 检查香槟瓶是否已经弹出过，如果没有则添加弹出动画的类名
            if (!champagneBottle.classList.contains('champagne-pop')) {
                champagneBottle.classList.add('champagne-pop');

                // 可以在这里添加音效或其他效果
                // 例如：播放开香槟的音效文件
                // const audio = new Audio('champagne_pop.mp3');
                // audio.play();
            }
        });
    </script>  
</center>
</body>
</html>
